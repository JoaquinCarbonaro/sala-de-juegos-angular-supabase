<div class="container mt-5 pt-5">
  <!-- Hero Section -->
  <div class="row mb-5">
    <div class="col-12 text-center">
      <h1 class="display-4 fw-bold text-primary mb-3">
        <i class="bi bi-controller me-3"></i>
        Bienvenido a la Sala de Juegos
      </h1>
      <p class="lead text-light mb-4">
        Disfruta de una colección de juegos clásicos desarrollados con Angular
      </p>
      <div class="d-flex justify-content-center gap-3">
        <a routerLink="/login" class="btn btn-primary btn-lg">
          <i class="bi bi-play-circle me-2"></i>
          Comenzar a Jugar
        </a>
        <a routerLink="/sobre-mi" class="btn btn-outline-light btn-lg">
          <i class="bi bi-person me-2"></i>
          Conocer al Desarrollador
        </a>
      </div>
    </div>
  </div>

  <!-- Juegos Disponibles -->
  <div class="row mb-5">
    <div class="col-12">
      <h2 class="text-center mb-4 text-primary">Juegos Disponibles</h2>
      <div class="row g-4">
        <div class="col-md-6 col-lg-3" *ngFor="let juego of juegos">
          <div class="card h-100 game-card" [class.disabled]="!juego.disponible">
            <div class="card-body text-center lead text-muted mb-3">
              <i class="{{juego.icono}} display-4 text-primary mb-3"></i>
              <h5 class="card-title">{{juego.nombre}}</h5>
              <p class="card-text">{{juego.descripcion}}</p>
              <div class="mt-auto">
                <span *ngIf="!juego.disponible" class="badge bg-secondary">
                  Sprint {{juego.sprint}}
                </span>
                <button *ngIf="juego.disponible" class="btn btn-primary">
                  Jugar
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
