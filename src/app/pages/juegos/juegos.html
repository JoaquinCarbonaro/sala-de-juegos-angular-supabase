<div class="container mt-5 pt-5 hero-section">
  <div class="row">
    <div class="col-12">
      <!--cargan las rutas hijas-->
      <router-outlet #childOutlet="outlet"></router-outlet>
    </div>
  </div>

  @if (!childOutlet.isActivated) {
    <!--titulo principal-->
    <div class="row mb-5">
      <div class="col-12 text-center">
        <!--titulo con icono-->
        <h1 class="hero-title fw-bold text-primary mb-2">
          <i class="bi bi-controller me-2"></i> Sala de Juegos
        </h1>
        <!--subtitulo-->
        <p class="lead text-light mb-4">Elige tu juego favorito y comienza la diversión</p>
      </div>
    </div>

    @if (usuario$ | async) {
      <!--listado de juegos-->
      <div class="row mb-5">
        <div class="col-12">
          <div class="row g-4">
            @for (juego of juegos; track $index) {
              <!--columna para cada juego-->
              <div class="col-md-6 col-lg-3">
                <!--tarjeta de juego-->
                <div class="card h-100 game-card">
                  <div class="card-body d-flex flex-column text-center">

                    <!--imagen del juego-->
                    <div class="game-thumb-wrap">
                      <img class="game-thumb"
                           [src]="juego.imagen"
                           [alt]="'Logo de ' + juego.nombre"
                           loading="lazy"
                           decoding="async"
                           (error)="onImgError($event)">
                    </div>

                    <!--titulo del juego-->
                    <h5 class="card-title">
                      <span class="text-light">{{ juego.nombre }}</span>
                    </h5>

                    <!--descripcion del juego-->
                    <p class="card-text text-muted">{{ juego.descripcion }}</p>

                    <!--boton para jugar-->
                    <div class="mt-auto">
                      <button class="btn btn-primary" (click)="jugarJuego(juego.ruta)">Jugar</button>
                    </div>

                  </div>
                </div>
              </div>
            }
          </div>
        </div>
      </div>
    }
  }
</div>
